<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>記事一覧｜ATAWI COMEDY</title>
  <meta name="description" content="ATAWI COMEDYで公開しているお笑いネタ記事の一覧です。公式YouTubeで見られるネタを、間・世界・ワードの視点で紹介します。">
  <link rel="canonical" href="https://atawicomedy.link/articles/">
  <meta property="og:site_name" content="ATAWI COMEDY">
  <meta property="og:type" content="website">
  <meta property="og:title" content="記事一覧｜ATAWI COMEDY">
  <meta property="og:description" content="公開済みのお笑いネタ記事を一覧で探せます。">
  <meta property="og:url" content="https://atawicomedy.link/articles/">
  <meta property="og:image" content="https://i.ytimg.com/vi/qpIb1NKU1c8/hqdefault.jpg">
  <link rel="stylesheet" href="/assets/css/style.css?v=20260709">
  <script src="/assets/js/main.js?v=20260708b" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="ATAWI COMEDY トップへ戻る">
        <img class="brand-logo" src="/assets/images/atawi-comedy-logo.svg" alt="ATAWI COMEDY">
        <span class="brand-sub">笑いと記憶をたどるお笑い帖</span>
      </a>
      <div class="header-links">
        <a class="presented-link" href="/about.html">Presented by Hiroyuki Oishi</a>
        <nav class="site-nav" aria-label="メインナビゲーション">
          <a href="/">トップ</a>
          <a href="/oishi-selection-viewpoint.html">大石セレクション</a>
          <a href="/articles/">記事一覧</a>
          <a href="/playlist/">大石再生リスト</a>
          <a href="/contact.html">お問い合わせ</a>
          <a class="random-link" href="/?random=1" data-random-link>ランダムに1ネタと出会う</a>
        </nav>
      </div>
    </div>
  </header>
  <main class="page-main">
    <section class="page-section">
      <h1>記事一覧</h1>
      <p class="lead">公開済みのネタ記事を、芸人・年代・気分・ジャンルから探せます。</p>
    </section>
    <section aria-labelledby="article-list-title">
      <div class="section-head">
        <h2 id="article-list-title">すべてのネタ記事</h2>
        <span class="count" data-video-count>0件</span>
      </div>
      <div class="controls" data-video-controls>
        <input type="search" data-search placeholder="ネタ名・芸人名・気分で検索" aria-label="検索">
        <select data-filter-performer aria-label="芸人で絞り込む"></select>
        <select data-filter-decade aria-label="年代で絞り込む"></select>
        <select data-filter-theme aria-label="ジャンル・テーマで絞り込む"></select>
        <select data-sort aria-label="並び替え">
          <option value="featured">おすすめ順</option>
          <option value="created-desc">新着順</option>
          <option value="year-desc">公開年が新しい順</option>
          <option value="year-asc">公開年が古い順</option>
          <option value="performer">芸人名順</option>
          <option value="title">ネタ名順</option>
        </select>
        <button class="button ghost" type="button" data-reset-filters>解除</button>
      </div>
      <div class="video-grid" data-video-list data-initial-count="10" data-page-size="20"></div>
      <div class="more-row">
        <button class="button secondary" type="button" data-load-more hidden>さらに表示</button>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
  <script src="/assets/js/footer.js?v=20260708"></script>
</body>
</html>
